# ============================================================================
# WSO2 API Manager — deployment.toml
# ============================================================================
# Custom configuration for the all-in-one APIM profile.
# This overrides default settings to:
#   1. Point the gateway to the Express backend
#   2. Enable JWT token generation
#   3. Configure CORS for the React frontend
# ============================================================================

[server]
hostname = "localhost"
offset = 0

[super_admin]
username = "admin"
password = "admin"
create_admin_account = true

# ── Gateway Environment ──
[apim.gateway.environment]
name = "Development"
type = "hybrid"
display_in_api_console = true
description = "Development Gateway Environment"
service_url = "https://localhost:9443/services/"
ws_endpoint = "ws://localhost:9099"
wss_endpoint = "wss://localhost:8099"
http_endpoint = "http://localhost:8280"
https_endpoint = "https://localhost:8243"

# ── Key Manager (built-in) ──
[apim.key_manager]
type = "default"
service_url = "https://localhost:9443/services/"
username = "$ref{super_admin.username}"
password = "$ref{super_admin.password}"

# ── JWT Token Configuration ──
[apim.jwt]
enable = true
encoding = "base64"
header = "X-JWT-Assertion"
claims_extractor_impl = "org.wso2.carbon.apimgt.impl.token.DefaultClaimsRetriever"

[apim.jwt.claim_dialect]
consumer_dialect_uri = "http://wso2.org/claims"
application_dialect_uri = "http://wso2.org/claims"

# ── CORS Configuration ──
[apim.cors]
allow_origins = ["http://localhost:5173", "http://localhost:3000"]
allow_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allow_headers = ["Authorization", "Content-Type", "X-Requested-With"]
allow_credentials = true
enable = true

# ── Throttling Tiers ──
# These tiers are available when publishing APIs
[apim.throttling]
enable_data_publishing = false
enable_policy_deploy = true
throttle_decision_endpoints = ["tcp://localhost:5672"]

# ── Token Revocation ──
[apim.token.revocation]
EnableTokenRevocationNotifications = false

# ── Database (H2 for development — use MySQL/PostgreSQL in production) ──
[database.apim_db]
type = "h2"
url = "jdbc:h2:./repository/database/WSO2AM_DB;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"

[database.shared_db]
type = "h2"
url = "jdbc:h2:./repository/database/WSO2SHARED_DB;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE"
username = "wso2carbon"
password = "wso2carbon"

# ── Analytics ──
[apim.analytics]
enable = false
