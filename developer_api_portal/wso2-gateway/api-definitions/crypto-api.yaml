openapi: "3.0.3"
info:
  title: Cryptocurrency API
  description: |
    Real-time cryptocurrency price data from CoinGecko.
    Supports BTC, ETH, SOL, ADA, and XRP.
    
    **Published via WSO2 API Manager** with OAuth2 security and rate limiting.
  version: "1.0.0"
  contact:
    name: Enterprise API Portal
    url: https://github.com/deshanFdo/apiPortal

servers:
  - url: http://backend-api:3000/api/v1
    description: Backend service (internal)
  - url: https://localhost:8243/crypto/1.0.0
    description: WSO2 API Gateway (external)

paths:
  /crypto/all:
    get:
      operationId: getAllCrypto
      summary: Get prices for all supported cryptocurrencies
      description: Returns real-time prices, 24h change, and market cap for BTC, ETH, SOL, ADA, XRP.
      responses:
        '200':
          description: Crypto data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CryptoData'

components:
  schemas:
    CryptoData:
      type: object
      properties:
        symbol:
          type: string
          example: BTC
        name:
          type: string
          example: Bitcoin
        price:
          type: number
          example: 62450.00
        changePercent:
          type: number
          example: 2.35
        marketCap:
          type: string
          example: "1.2T"
        lastUpdated:
          type: string
          format: date-time

  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://localhost:9443/oauth2/token
          scopes:
            crypto:read: Read crypto data

security:
  - OAuth2:
      - crypto:read
